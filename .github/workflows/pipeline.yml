name: SA Prepaid Meter — CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Run tests on every push
  # ─────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn psycopg2-binary redis \
          pytest httpx prometheus-fastapi-instrumentator \
          pydantic requests

      - name: Run unit tests
        run: |
          cd app
          pytest test_main.py -v

  # ─────────────────────────────────────────
  # JOB 2 — Build and push Docker images
  # ─────────────────────────────────────────
  build:
    name: Build and push Docker images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:${{ github.sha }}

      - name: Build and push simulator image
        uses: docker/build-push-action@v5
        with:
          context: ./simulator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3 — Manual Kubernetes deploy instructions
  # ─────────────────────────────────────────
  deploy-instructions:
    name: Print deployment instructions
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Print manual deploy steps
        run: |
          echo "============================================"
          echo " SA Prepaid Meter — Deployment Instructions"
          echo "============================================"
          echo ""
          echo "Build passed. To deploy to your local k3s cluster:"
          echo ""
          echo "1. Pull the latest images:"
          echo "   kubectl apply -f k8s/"
          echo ""
          echo "2. Restart deployments with new images:"
          echo "   kubectl rollout restart deployment/meter-app -n sa-meter"
          echo "   kubectl rollout restart deployment/meter-simulator -n sa-meter"
          echo ""
          echo "3. Watch pods come up:"
          echo "   kubectl get pods -n sa-meter --watch"
          echo ""
          echo "4. Test the API:"
          echo "   curl http://localhost:30081/health"
          echo ""
          echo "API Image:       ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:${{ github.sha }}"
          echo "Simulator Image: ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:${{ github.sha }}"
          echo "Deployed at:     $(date)"
