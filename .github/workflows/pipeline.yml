name: SA Prepaid Meter — CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Type YES to deploy to production'
        required: true
        default: 'NO'

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Run tests on every push
  # ─────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn psycopg2-binary redis \
          pytest httpx prometheus-fastapi-instrumentator \
          pydantic requests

      - name: Run unit tests
        run: |
          cd app
          pytest test_main.py -v

  # ─────────────────────────────────────────
  # JOB 2 — Build and push Docker images
  # ─────────────────────────────────────────
  build:
    name: Build and push Docker images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:${{ github.sha }}

      - name: Build and push simulator image
        uses: docker/build-push-action@v5
        with:
          context: ./simulator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3 — Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/postgres-deployment.yml
          kubectl apply -f k8s/redis-deployment.yml
          kubectl apply -f k8s/app-deployment.yml
          kubectl apply -f k8s/app-service.yml
          kubectl apply -f k8s/simulator-deployment.yml
          kubectl apply -f k8s/hpa.yml

      - name: Update API image to latest commit
        run: |
          kubectl set image deployment/meter-app \
            meter-app=${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:${{ github.sha }} \
            -n sa-meter

      - name: Update simulator image to latest commit
        run: |
          kubectl set image deployment/meter-simulator \
            meter-simulator=${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:${{ github.sha }} \
            -n sa-meter

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/meter-app \
            -n sa-meter --timeout=120s

      - name: Wait for simulator rollout
        run: |
          kubectl rollout status deployment/meter-simulator \
            -n sa-meter --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n sa-meter
          kubectl get hpa -n sa-meter
          echo "Deployment successful at $(date)"
          echo "API image: ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-api:${{ github.sha }}"
          echo "Simulator image: ${{ secrets.DOCKERHUB_USERNAME }}/sa-prepaid-meter-simulator:${{ github.sha }}"

  # ─────────────────────────────────────────
  # JOB 4 — Smoke test after deployment
  # ─────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run smoke test
        run: |
          kubectl get pods -n sa-meter
          echo "Checking rollout history..."
          kubectl rollout history deployment/meter-app -n sa-meter
          echo "Smoke test complete — system is healthy"

      - name: Confirm rollback available
        run: |
          echo "To rollback the API run:"
          echo "kubectl rollout undo deployment/meter-app -n sa-meter"
          echo "To rollback the simulator run:"
          echo "kubectl rollout undo deployment/meter-simulator -n sa-meter"
